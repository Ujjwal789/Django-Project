{% extends "layout.html" %}

{% block title %}
Chai Stores
{% endblock %}

{% block content %}
<h1 class="text-center text-3xl font-bold mt-4">
    Chai Stores
</h1>
<form method="post">
    {% csrf_token %}
    {{ form }}
    <button type="submit" class="bg-green-600 text-white w-100px h-10 py-2 mt-3 rounded-lg hover:bg-green-700">
        Search Store
    </button>
</form>
{% if stores %}
<h2 class="text-center text-2xl font-bold mt-4">
    Store Available
</h2>

<ul>
    {% for store in stores %}
    <li>{{ store.name }} - {{ store.location }}</li>
    {% endfor %}
</ul>
{% endif %}
{% endblock %}
