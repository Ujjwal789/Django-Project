{% extends "layout.html" %}

{% block title %}
chai details Page
{% endblock title %}

{% block content %}


<div class="flex justify-center mt-10">

    <div class="chai-item bg-white p-6 rounded-2xl shadow-lg w-96">

        <!-- Image -->
        <img class="rounded-lg shadow-md w-full h-64 object-cover"
             src="{{ chai.image.url }}"
             alt="{{ chai.name }}">

        <!-- Name -->
        <h2 class="text-2xl font-bold text-gray-800 mt-4">
            {{ chai.name }}
        </h2>

        <!-- Type -->
        <p class="text-sm text-gray-500 mt-1">
            Type: {{ chai.get_type_display }}
        </p>

        <!-- Description -->
        <p class="mt-3 text-gray-700">
            {{ chai.descriptions }}
        </p>

        <!-- ID (optional) -->
        <p class="text-xs text-gray-400 mt-2">
            ID: {{ chai.id }}
        </p>
       <a href="{% url 'chai_list' %}">
    <button class="bg-orange-600 text-white w-full py-2 mt-3 rounded-lg hover:bg-orange-700">
        Buy Now
    </button>
    </a>

    </div>
    

</div>

{% endblock content %}
