{% extends "layout.html" %}

{% block title %}
Home Page
{% endblock %}

{% block content %}

<h1 class="text-center text-3xl font-bold mt-4">
    This is first app
</h1>

<div class="grid grid-cols-4 gap-4 m-10">

{% for chai in chais %}
<div class="bg-white p-5 rounded-2xl shadow-lg">

    <img class="rounded-lg w-full h-48 object-cover"
         src="{{ chai.image.url }}"
         alt="{{ chai.name }}">

    <h3 class="text-xl font-bold mt-2">
        {{ chai.name }}
    </h3>

    <a href="{% url 'chai_details' chai.id %}">
        <button class="bg-orange-600 text-white w-full py-2 mt-3 rounded-lg hover:bg-orange-700">
           View Details 
        </button>
    </a>

</div>
{% endfor %}

</div>

{% endblock %}
